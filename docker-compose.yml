# Compose project name → Docker Desktop shows "struxient-v5" (not a random folder hash).
name: struxient-v5

services:
  db:
    image: postgres:17-alpine
    container_name: struxient-v5-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: struxient
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: struxient-v5-web:latest
    container_name: struxient-v5-web
    restart: unless-stopped
    build:
      context: ./apps/web
      dockerfile: ../../docker/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres_password@db:5432/struxient?schema=public
    depends_on:
      - db
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:3000/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
